<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هل نسيت كلمة المرور؟</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>هل نسيت كلمة المرور؟</h2>
            <p style="font-size: 14px;">أدخل عنوان بريدك الإلكتروني لإعادة تعيين كلمة المرور</p>
        </div>
        
        <form id="forgetPasswordForm">
            <div class="form-group">
                <label for="email">عنوان البريد الإلكتروني</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="أدخل بريدك الإلكتروني" 
                    required
                >
            </div>
            <div id="message"></div>
            <button type="submit">إرسال رابط إعادة التعيين</button>
            
            <div id="message" class="message"></div>
        </form>
        
        <div class="links">
            <a href="login.html">العودة إلى تسجيل الدخول</a>
            <span>|</span>
            <a href="register.html">إنشاء حساب</a>
        </div>
    </div>
    <canvas id="bg"></canvas>
    
<script>
    const canvas = document.getElementById("bg");
    const ctx = canvas.getContext("2d");



canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let mouse = {x:null,y:null};

window.addEventListener("mousemove", e=>{
  mouse.x = e.x;
  mouse.y = e.y;
});

window.addEventListener("resize", ()=>{
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

class Particle{
  constructor(){
    this.x = Math.random()*canvas.width;
    this.y = Math.random()*canvas.height;
    this.vx = (Math.random()-0.5)*1;
    this.vy = (Math.random()-0.5)*1;
    this.size = 2;
  }

  move(){
    this.x += this.vx;
    this.y += this.vy;

    if(this.x<0 || this.x>canvas.width) this.vx*=-1;
    if(this.y<0 || this.y>canvas.height) this.vy*=-1;
  }

  draw(){
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
    ctx.fillStyle="#3b82f6";
    ctx.fill();
  }
}

let particles=[];
for(let i=0;i<120;i++){
  particles.push(new Particle());
}

function connect(){
  for(let a=0;a<particles.length;a++){
    for(let b=a;b<particles.length;b++){
      let dx = particles[a].x - particles[b].x;
      let dy = particles[a].y - particles[b].y;
      let dist = Math.sqrt(dx*dx + dy*dy);

      if(dist < 120){
        ctx.strokeStyle="rgba(59,130,246,0.2)";
        ctx.lineWidth=1;
        ctx.beginPath();
        ctx.moveTo(particles[a].x,particles[a].y);
        ctx.lineTo(particles[b].x,particles[b].y);
        ctx.stroke();
      }
    }

    if(mouse.x){
      let dx = particles[a].x - mouse.x;
      let dy = particles[a].y - mouse.y;
      let dist = Math.sqrt(dx*dx + dy*dy);

      if(dist < 150){
        ctx.strokeStyle="rgba(59,130,246,0.5)";
        ctx.beginPath();
        ctx.moveTo(particles[a].x,particles[a].y);
        ctx.lineTo(mouse.x,mouse.y);
        ctx.stroke();
      }
    }
  }
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    p.move();
    p.draw();
  });

  connect();

  requestAnimationFrame(animate);
}

animate();

        document.getElementById('forgetPasswordForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const messageDiv = document.getElementById('message');
            
            // Reset message
            messageDiv.classList.remove('success', 'error');
            messageDiv.textContent = '';
            
            // Validate email
            if (!email) {
                messageDiv.classList.add('error');
                messageDiv.textContent = 'يرجى إدخال عنوان بريدك الإلكتروني';
                return;
            }
            
            // Simulate API call
            messageDiv.classList.add('success');
            messageDiv.textContent = 'تم إرسال رابط إعادة تعيين كلمة المرور إلى ' + email;
            
            // Clear form
            document.getElementById('forgetPasswordForm').reset();
        });
    </script>
</body>
</html>
