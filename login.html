<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>استلام الحسابات | GX-Generator</title>
<link rel="stylesheet" href="style.css">
<style>

</style>
</head>
<body>
<div class="login-light"></div>
<div class="container">
    <h2>تسجيل الدخول</h2>
    <p style="color: #9ca3af; font-size: 14px;">أدخل بياناتك لفتح القفل عن حساباتك</p>
    <input type="text" id="username" placeholder="اسم المستخدم او البريد الإلكتروني">
    <input type="password" id="password" placeholder="كلمة المرور">
    <label class="rememberMe"><input type="checkbox">rememberMe</label>
    <button id="loginBtn" class="button" onclick="login()">تسجيل الدخول</button>
    <div class="links">
        <a href="forget-password.html">نسيت كلمة المرور?</a>
        <span>|</span>
        <a href="register.html">لا املك حساب </a>
    </div>
</div>
<canvas id="bg"></canvas>
</body>
<script>
    const canvas = document.getElementById("bg");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let mouse = {x:null,y:null};

window.addEventListener("mousemove", e=>{
  mouse.x = e.x;
  mouse.y = e.y;
});

window.addEventListener("resize", ()=>{
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

class Particle{
  constructor(){
    this.x = Math.random()*canvas.width;
    this.y = Math.random()*canvas.height;
    this.vx = (Math.random()-0.5)*1;
    this.vy = (Math.random()-0.5)*1;
    this.size = 2;
  }

  move(){
    this.x += this.vx;
    this.y += this.vy;

    if(this.x<0 || this.x>canvas.width) this.vx*=-1;
    if(this.y<0 || this.y>canvas.height) this.vy*=-1;
  }

  draw(){
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
    ctx.fillStyle="#3b82f6";
    ctx.fill();
  }
}

let particles=[];
for(let i=0;i<120;i++){
  particles.push(new Particle());
}

function connect(){
  for(let a=0;a<particles.length;a++){
    for(let b=a;b<particles.length;b++){
      let dx = particles[a].x - particles[b].x;
      let dy = particles[a].y - particles[b].y;
      let dist = Math.sqrt(dx*dx + dy*dy);

      if(dist < 120){
        ctx.strokeStyle="rgba(59,130,246,0.2)";
        ctx.lineWidth=1;
        ctx.beginPath();
        ctx.moveTo(particles[a].x,particles[a].y);
        ctx.lineTo(particles[b].x,particles[b].y);
        ctx.stroke();
      }
    }

    if(mouse.x){
      let dx = particles[a].x - mouse.x;
      let dy = particles[a].y - mouse.y;
      let dist = Math.sqrt(dx*dx + dy*dy);

      if(dist < 150){
        ctx.strokeStyle="rgba(59,130,246,0.5)";
        ctx.beginPath();
        ctx.moveTo(particles[a].x,particles[a].y);
        ctx.lineTo(mouse.x,mouse.y);
        ctx.stroke();
      }
    }
  }
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    p.move();
    p.draw();
  });

  connect();

  requestAnimationFrame(animate);
}

animate();

function login() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        if (username === "FastTime" && password === "admin11000") {
            window.location.href = 'index.html';
        } else {
            alert("بيانات غير صحيحة! حاول مرة أخرى.");
        }
    }</script>


</html>
