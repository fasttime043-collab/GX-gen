<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>GX-Generator | الرئيسية</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/x-icon" href="logo.ico">
</head>
<body>

<div class="clock-container">
    <div id="resetTimer">00:00:00</div>
</div>

<canvas id="bg"></canvas>

<div class="card">
  <div class="logo">✨</div>
  <div class="title">GX-Generator</div>
  <div class="subtitle">نظام التوليد v4.0</div>
  <div class="select" onclick="toggleServices()">اختر الخدمة</div>
  <div class="grid" id="services">
    <div class="service" data-name="Netflix" onclick="useService(this)"><img src="pic/icons-netflix.png"></div>
    <div class="service" data-name="Spotify" onclick="useService(this)"><img src="pic/icons-spotify.png"></div>
    <div class="service" data-name="Steam" onclick="useService(this)"><img src="pic/icons-Steam.png"></div>
    <div class="service" data-name="Xbox" onclick="useService(this)"><img src="pic/icons-Xbox.png"></div>
    <div class="service" data-name="Roblox" onclick="useService(this)"><img src="pic/icons-roblox.png"></div>
    <div class="service" data-name="Minecraft" onclick="useService(this)"><img src="pic/icons-minecraft.png"></div>
    <div class="service" data-name="Epic" onclick="useService(this)"><img src="pic/icons-epic.png"></div>
    <div class="service" data-name="Amazon" onclick="useService(this)"><img src="pic/icons-amazon.png"></div>
    <div class="service" data-name="Crunchyroll" onclick="useService(this)"><img src="pic/icons-Crunchyroll.png"></div>
    <div class="service" data-name="fortnite" onclick="useService(this)"><img src="pic/icons-fortnite.png"></div>
    <div class="service" data-name="hotmail" onclick="useService(this)"><img src="pic/icons-hotmail.png"></div>
    <div class="service" data-name="Random" onclick="useService(this)"><img src="pic/icons-random.png"></div>
  </div>
</div>

<div class="activity">
  <h4 style="margin:0; font-size:12px; color:#60a5fa;">● السجل المباشر</h4>
  <div id="logContainer"></div>
  <button id="claimBtn" onclick="window.location.href='task.html'">🎁 استلام الحسابات (CLAIM)</button>
</div>

<div id="usageTracker" class="usage-tracker">
    المحاولات المتبقية: <span id="remCount">--</span>
</div>
</body>
<script>
const DAILY_LIMIT = 2;
const RESET_INTERVAL_MS = 24 * 60 * 60 * 1000; // 24 ساعة

function updateUI() {
    const now = new Date().getTime();
    let usage = JSON.parse(localStorage.getItem('gx_usage') || '{}');
    
    // التحقق مما إذا مر 5 دقائق منذ آخر تصفير
    if (usage.nextReset && now >= usage.nextReset) {
        usage = { 
            nextReset: now + RESET_INTERVAL_MS, 
            count: 0, 
            services: [] 
        };
        localStorage.setItem('gx_usage', JSON.stringify(usage));
    } else if (!usage.nextReset) {
        // إعداد التوقيت لأول مرة
        usage.nextReset = now + RESET_INTERVAL_MS;
        localStorage.setItem('gx_usage', JSON.stringify(usage));
    }

    const currentCount = usage.count || 0;
    const rem = DAILY_LIMIT - currentCount;
    const remDisplay = rem > 0 ? rem : 0;

    const remCountEl = document.getElementById('remCount');
    if(remCountEl) {
        remCountEl.innerText = remDisplay;
    }
}

// الوظيفة الجديدة لحساب الوقت المتبقي حتى منتصف الليل
function updateResetTimer() {
    const now = new Date().getTime();
    let usage = JSON.parse(localStorage.getItem('gx_usage') || '{}');
    
    if (!usage.nextReset) return;

    const diff = usage.nextReset - now;

    if (diff <= 0) {
        updateUI(); // قم بتحديث البيانات فور انتهاء الوقت
        return;
    }

    const hours = Math.floor(diff / (1000 * 60 * 60));
    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((diff % (1000 * 60)) / 1000);

    const display = 
        String(hours).padStart(2, '0') + ":" +
        String(minutes).padStart(2, '0') + ":" + 
        String(seconds).padStart(2, '0');

    document.getElementById('resetTimer').innerText = "" + display;
}

// تشغيل العداد وتحديث الواجهة عند تحميل الصفحة
updateUI();
setInterval(() => {
    updateUI();
    updateResetTimer();
}, 1000);
updateResetTimer();


// --- وظائف الخدمات والقائمة ---
function toggleServices() {
    const servicesGrid = document.getElementById("services");
    if(servicesGrid) servicesGrid.classList.toggle("show");
}

function useService(el) {
    const name = el.dataset.name;
    const now = new Date().getTime();
    let usage = JSON.parse(localStorage.getItem('gx_usage') || '{}');

    if (usage.count >= DAILY_LIMIT) {
        alert("⚠️ وصلت للحد المسموح!.");
        return;
    }

    const loader = document.createElement('div');
    loader.className = 'loader';
    el.appendChild(loader);

    setTimeout(() => {
        loader.remove();
        usage.count++;
        usage.services.push(name);
        localStorage.setItem('gx_usage', JSON.stringify(usage));
        addLog(`تم تجهيز ${name}..`);
        updateUI();
        document.getElementById('claimBtn').style.display = 'block';
    }, 1000);
}
function addLog(t){
    const c = document.getElementById('logContainer');
    if(!c) return;
    const l = document.createElement('div'); l.className='log'; l.innerText=t;
    c.prepend(l); setTimeout(()=>l.classList.add('show'), 50);
    if(c.children.length > 4) c.lastChild.remove();
}

const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let mouse = {x:null,y:null};

window.addEventListener("mousemove", e=>{
  mouse.x = e.x;
  mouse.y = e.y;
});

window.addEventListener("resize", ()=>{
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

class Particle{
  constructor(){
    this.x = Math.random()*canvas.width;
    this.y = Math.random()*canvas.height;
    this.vx = (Math.random()-0.5)*1;
    this.vy = (Math.random()-0.5)*1;
    this.size = 2;
  }

  move(){
    this.x += this.vx;
    this.y += this.vy;

    if(this.x<0 || this.x>canvas.width) this.vx*=-1;
    if(this.y<0 || this.y>canvas.height) this.vy*=-1;
  }

  draw(){
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
    ctx.fillStyle="#3b82f6";
    ctx.fill();
  }
}

let particles=[];
for(let i=0;i<120;i++){
  particles.push(new Particle());
}

function connect(){
  for(let a=0;a<particles.length;a++){
    for(let b=a;b<particles.length;b++){
      let dx = particles[a].x - particles[b].x;
      let dy = particles[a].y - particles[b].y;
      let dist = Math.sqrt(dx*dx + dy*dy);

      if(dist < 120){
        ctx.strokeStyle="rgba(59,130,246,0.2)";
        ctx.lineWidth=1;
        ctx.beginPath();
        ctx.moveTo(particles[a].x,particles[a].y);
        ctx.lineTo(particles[b].x,particles[b].y);
        ctx.stroke();
      }
    }

    if(mouse.x){
      let dx = particles[a].x - mouse.x;
      let dy = particles[a].y - mouse.y;
      let dist = Math.sqrt(dx*dx + dy*dy);

      if(dist < 150){
        ctx.strokeStyle="rgba(59,130,246,0.5)";
        ctx.beginPath();
        ctx.moveTo(particles[a].x,particles[a].y);
        ctx.lineTo(mouse.x,mouse.y);
        ctx.stroke();
      }
    }
  }
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    p.move();
    p.draw();
  });

  connect();

  requestAnimationFrame(animate);
}

animate();
</script>

</html>
