<canvas id="bg"></canvas>

<script>

    const video = document.getElementById('taskVideo');

    function toggleMute() {

        document.getElementById('muteBtn').innerText = video.muted ? "🔇 تشغيل الصوت" : "🔊 كتم الصوت";

    function revealAll() {

const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let mouse = {x:null,y:null};

window.addEventListener("mousemove", e=>{
  mouse.x = e.x;
  mouse.y = e.y;
});

window.addEventListener("resize", ()=>{
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

class Particle{
  constructor(){
    this.x = Math.random()*canvas.width;
    this.y = Math.random()*canvas.height;
    this.vx = (Math.random()-0.5)*1;
    this.vy = (Math.random()-0.5)*1;
    this.size = 2;
  }

  move(){
    this.x += this.vx;
    this.y += this.vy;

    if(this.x<0 || this.x>canvas.width) this.vx*=-1;
    if(this.y<0 || this.y>canvas.height) this.vy*=-1;
  }

  draw(){
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
    ctx.fillStyle="#3b82f6";
    ctx.fill();
  }
}

let particles=[];
for(let i=0;i<120;i++){
  particles.push(new Particle());
}

function connect(){
  for(let a=0;a<particles.length;a++){
    for(let b=a;b<particles.length;b++){
      let dx = particles[a].x - particles[b].x;
      let dy = particles[a].y - particles[b].y;
      let dist = Math.sqrt(dx*dx + dy*dy);

      if(dist < 120){
        ctx.strokeStyle="rgba(59,130,246,0.2)";
        ctx.lineWidth=1;
        ctx.beginPath();
        ctx.moveTo(particles[a].x,particles[a].y);
        ctx.lineTo(particles[b].x,particles[b].y);
        ctx.stroke();
      }
    }

    if(mouse.x){
      let dx = particles[a].x - mouse.x;
      let dy = particles[a].y - mouse.y;
      let dist = Math.sqrt(dx*dx + dy*dy);

      if(dist < 150){
        ctx.strokeStyle="rgba(59,130,246,0.5)";
        ctx.beginPath();
        ctx.moveTo(particles[a].x,particles[a].y);
        ctx.lineTo(mouse.x,mouse.y);
        ctx.stroke();
      }
    }
  }
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    p.move();
    p.draw();
  });

  connect();

  requestAnimationFrame(animate);
}

animate();

let videos = [
    "vid/vid1.mp4",
    "vid/vid2.mp4",
    "vid/vid3.mp4",
    "vid/vid4.mp4"
];

let randomVideo = videos[Math.floor(Math.random() * videos.length)];

document.getElementById("videoSource").src = randomVideo;
document.getElementById("myVideo").load();
