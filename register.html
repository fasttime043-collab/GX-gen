<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>استلام الحسابات | GX-Generator</title>
<link rel="stylesheet" href="style.css">
<style>

</style>
</head>
<body>
    <div class="container">
        <h2>انشاء الحساب</h2>
        <p style="color: #9ca3af; font-size: 14px;">يرجى انشاء حساب جديد</p>
        <input type="text" id="newEmail" placeholder="البريد الإلكتروني">
        <input type="text" id="newUsername" placeholder="اسم المستخدم">
        <input type="password" id="newPassword" placeholder="كلمة المرور">
        <input type="password" id="confirmPassword" placeholder="تأكيد كلمة المرور">
        <div class="links">
            <p style="color: #9ca3af; font-size: 14px;">بإنشاء حسابك، فإنك توافق على <a href="terms.html">شروط الاستخدام</a> و <a href="privacy.html">سياسة الخصوصية</a>.</p>
        </div>
        <div id="message"></div>
        <button id="registerBtn" class="button" onclick="register()">تسجيل</button>
        <div class="links">
            <p>هل لديك حساب بالفعل؟ <a href="login.html">تسجيل الدخول</a></p>
        </div>
    </div>
<canvas id="bg"></canvas>

</body>
<script>
function register() {
    const email = document.getElementById('newEmail').value;
    const username = document.getElementById('newUsername').value;
    const password = document.getElementById('newPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const messageDiv = document.getElementById("message");

    messageDiv.textContent = "";
    messageDiv.className = "";

    if (password !== confirmPassword) {
        messageDiv.classList.add('error');
        messageDiv.textContent = 'كلمات المرور غير متطابقة!';
        return;
    }
    // Validate variables
    if (!email) {
        messageDiv.classList.add('error');
        messageDiv.textContent = 'يرجى إدخال عنوان بريدك الإلكتروني';
        return;
    }
    if (!username) {
        messageDiv.classList.add('error');
        messageDiv.textContent = 'يرجى إدخال اسم المستخدم';
        return;
    }
    if (!password) {
        messageDiv.classList.add('error');
        messageDiv.textContent = 'يرجى إدخال كلمة المرور';
        return;
    }
    if (!confirmPassword) {
        messageDiv.classList.add('error');
        messageDiv.textContent = 'يرجى تأكيد كلمة المرور';
        return;
    }

    // Here you would typically send the registration data to a server
    // For now, we'll just simulate a successful registration
    alert("تم إنشاء الحساب بنجاح!");
    window.location.href = 'login.html';
    
}

const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let mouse = {x:null,y:null};

window.addEventListener("mousemove", e=>{
  mouse.x = e.x;
  mouse.y = e.y;
});

window.addEventListener("resize", ()=>{
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

class Particle{
  constructor(){
    this.x = Math.random()*canvas.width;
    this.y = Math.random()*canvas.height;
    this.vx = (Math.random()-0.5)*1;
    this.vy = (Math.random()-0.5)*1;
    this.size = 2;
  }

  move(){
    this.x += this.vx;
    this.y += this.vy;

    if(this.x<0 || this.x>canvas.width) this.vx*=-1;
    if(this.y<0 || this.y>canvas.height) this.vy*=-1;
  }

  draw(){
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
    ctx.fillStyle="#3b82f6";
    ctx.fill();
  }
}

let particles=[];
for(let i=0;i<120;i++){
  particles.push(new Particle());
}

function connect(){
  for(let a=0;a<particles.length;a++){
    for(let b=a;b<particles.length;b++){
      let dx = particles[a].x - particles[b].x;
      let dy = particles[a].y - particles[b].y;
      let dist = Math.sqrt(dx*dx + dy*dy);

      if(dist < 120){
        ctx.strokeStyle="rgba(59,130,246,0.2)";
        ctx.lineWidth=1;
        ctx.beginPath();
        ctx.moveTo(particles[a].x,particles[a].y);
        ctx.lineTo(particles[b].x,particles[b].y);
        ctx.stroke();
      }
    }

    if(mouse.x){
      let dx = particles[a].x - mouse.x;
      let dy = particles[a].y - mouse.y;
      let dist = Math.sqrt(dx*dx + dy*dy);

      if(dist < 150){
        ctx.strokeStyle="rgba(59,130,246,0.5)";
        ctx.beginPath();
        ctx.moveTo(particles[a].x,particles[a].y);
        ctx.lineTo(mouse.x,mouse.y);
        ctx.stroke();
      }
    }
  }
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    p.move();
    p.draw();
  });

  connect();

  requestAnimationFrame(animate);
}

animate();
</script>
</html>
